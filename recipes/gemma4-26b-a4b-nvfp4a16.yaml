# Recipe: Gemma4-26B-A4B NVFP4A16
# Pre-quantized NVFP4 (W4A16) variant - weight-only quantization for better quality
# Model: bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4A16
# Ref: https://huggingface.co/bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4A16

recipe_version: "1"
name: Gemma4-26B-A4B-NVFP4A16
description: vLLM serving Gemma4-26B-A4B with NVFP4 weight-only quantization (W4A16)

# HuggingFace model to download (optional, for --download-model)
model: bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4A16

# Container image to use
container: vllm-node

# Can run in solo mode only
solo_only: true

# Mods required for NVFP4 MoE support
mods:
  - mods/fix-gemma4-nvfp4-moe

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  gpu_memory_utilization: 0.40
  max_model_len: 262144
  max_num_seqs: 4

# Environment variables
env:
  VLLM_NVFP4_GEMM_BACKEND: marlin

# The vLLM serve command template
command: |
  vllm serve bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4A16 \
    --served-model-name gemma-4 \
    --host {host} --port {port} \
    --quantization modelopt \
    --dtype auto \
    --kv-cache-dtype fp8 \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --moe-backend marlin \
    --enable-auto-tool-choice \
    --tool-call-parser gemma4 \
    --reasoning-parser gemma4 \
    --trust-remote-code
